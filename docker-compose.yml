services:
  auth-service:
    build:
      context: ./server/auth-service
    ports:
      - '4001:4001'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4001
      - MONGODB_URI=mongodb://mongodb:27017/ai-edu-platform
      - JWT_SECRET=super-secret-jwt-key
    depends_on:
      - mongodb

  ai-service:
    build:
      context: ./server/ai-service
    ports:
      - '4002:4002'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4002
      - OLLAMA_URL=http://ollama:11434
      - MONGODB_URI=mongodb://mongodb:27017/ai-edu-platform
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - ollama
      - redis

  chat-service:
    build:
      context: ./server/chat-service
    ports:
      - '4003:4003'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4003
      - MONGODB_URI=mongodb://mongodb:27017/ai-edu-platform
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super-secret-jwt-key
    depends_on:
      - mongodb
      - redis

  notes-service:
    build:
      context: ./server/notes-service
    ports:
      - '4004:4004'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4004
      - MONGODB_URI=mongodb://mongodb:27017/ai-edu-platform
      - JWT_SECRET=super-secret-jwt-key
    depends_on:
      - mongodb

  community-service:
    build:
      context: ./server/community-service
    ports:
      - '4005:4005'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4005
      - MONGODB_URI=mongodb://mongodb:27017/ai-edu-platform
      - JWT_SECRET=super-secret-jwt-key
    depends_on:
      - mongodb

  notification-service:
    build:
      context: ./server/notification-service
    ports:
      - '4006:4006'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4006
      - MONGODB_URI=mongodb://mongodb:27017/ai-edu-platform
      - JWT_SECRET=super-secret-jwt-key
    depends_on:
      - mongodb

  web:
    build:
      context: ./apps/web
    command: sh -c "npm install && npm run preview -- --host 0.0.0.0 --port 4173"
    ports:
      - '4173:4173'
    depends_on:
      - auth-service
      - ai-service
      - chat-service
      - notes-service
      - community-service
      - notification-service

  redis:
    image: redis:7.0-alpine
    ports:
      - '6379:6379'

  mongodb:
    image: mongo:7.0
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    command: ["server"]

  nginx:
    image: nginx:stable-alpine
    ports:
      - '80:80'
    volumes:
      - './docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro'
    depends_on:
      - web
      - auth-service
      - ai-service
      - chat-service
      - notes-service
      - community-service
      - notification-service

volumes:
  mongodb_data:
