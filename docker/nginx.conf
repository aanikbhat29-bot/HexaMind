server {
  listen 80;
  server_name localhost;

  location / {
    proxy_pass http://web:4173;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/auth/ {
    proxy_pass http://auth-service:4001;
  }

  location /api/ai/ {
    proxy_pass http://ai-service:4002;
  }

  location /api/chat/ {
    proxy_pass http://chat-service:4003;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /api/notes/ {
    proxy_pass http://notes-service:4004;
  }

  location /api/community/ {
    proxy_pass http://community-service:4005;
  }

  location /api/notifications/ {
    proxy_pass http://notification-service:4006;
  }
}
