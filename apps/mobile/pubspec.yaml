name: ai_edu_mobile
description: A Flutter mobile app for the AI education platform.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.4.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_dotenv: ^5.0.2
  flutter_secure_storage: ^9.0.0
  http: ^1.1.0
dependency_overrides:
  sign_in_with_apple: ^8.0.0
  sign_in_with_apple_platform_interface: ^2.0.0
  sign_in_with_apple_web: ^3.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
flutter:
  uses-material-design: true
